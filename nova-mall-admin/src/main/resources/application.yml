spring:
  application:
    name: mall-admin
  profiles:
    active: dev #默认为开发环境
  servlet:
    multipart:
      enabled: true #开启文件上传
      max-file-size: 10MB #限制文件上传大小为10M
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus配置
mybatis-plus:
  mapper-locations:
    - classpath:dao/*.xml
    - classpath*:com/**/mapper/*.xml
  type-aliases-package: com.su.mall.model,com.su.mall.dao
  configuration:
    map-underscore-to-camel-case: true  # 开启驼峰命名自动映射（数据库下划线字段 → Java驼峰属性）
  global-config:
    db-config:
      id-type: auto

jwt:
  tokenHeader: Authorization #JWT存储的请求头
  secret: mall-admin-secret-key-2024-secure-enough-for-production-use-please-change-in-real-deployment
  expiration: 86400 #JWT的超期限时间(60*60*24=1天)
  tokenHead: 'Bearer '  #JWT负载中拿到开头

redis:
  database: mall
  key:
    admin: 'ums:admin'
    resourceList: 'ums:resourceList'
  expire:
    common: 86400 # 24小时

secure:
  ignored:
    urls: #安全路径白名单
      - /swagger-ui/**
      - /v3/api-docs
      - /v3/api-docs/**
      - /*/*.html
      - /*/*.js
      - /*/*.css
      - /*/*.png
      - /favicon.ico
      - /actuator/**
      - /druid/**
      - /admin/login
      - /admin/logout
      - /minio/upload
      - /aliyun/oss/policy

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    doc-expansion: 'none'
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'default'
      packages-to-scan: com.su.mall.controller
  default-flat-param-object: false
