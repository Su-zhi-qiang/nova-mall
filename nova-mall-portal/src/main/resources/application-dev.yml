server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://192.168.100.128:3307/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    druid:
      initial-size: 5 #连接池初始化大小
      min-idle: 10 #最小空闲连接数
      max-active: 20 #最大连接数
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*" #不统计这些请求数据
      stat-view-servlet: #访问监控网页的登录用户名和密码
        login-username: druid
        login-password: druid
  data:
    mongodb:
      host: 192.168.100.128
      port: 27017
      database: mall-port
    redis:
      host: 192.168.100.128 # Redis服务器地址
      database: 0 # Redis数据库索引（默认为0）
      port: 6379 # Redis服务器连接端口
      password: root # Redis服务器连接密码（默认为空）
      timeout: 300ms # 连接超时时间（毫秒）
  rabbitmq:
    host: 192.168.100.128
    port: 5672
    virtual-host: /mall
    username: mall
    password: mall

logging:
  level:
    root: info
    com.su.mall: debug

logstash:
  host: 192.168.100.128
  enableInnerLog: false

alipay:
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  appId: your appId
  alipayPublicKey: your alipayPublicKey
  appPrivateKey: your appPrivateKey
  returnUrl: http://localhost:8060/#/pages/money/paySuccess
  notifyUrl:

# 促销策略映射：promotionType值 -> 策略Bean名称
promotion:
  types:
    "-1": flashPromotionStrategy
    "0": noPromotionStrategy
    "1": singleItemPromotionStrategy
    "3": ladderDiscountPromotionStrategy
    "4": fullReductionPromotionStrategy

# 优惠券适用范围策略映射：useType值 -> 策略Bean名称
coupon:
  scopeTypes:
    "0": allProductCouponScopeStrategy
    "1": categoryCouponScopeStrategy
    "2": productCouponScopeStrategy

# 支付方式策略映射：payType值 -> 策略Bean名称
payment:
  types:
    "1": alipayPaymentStrategy
    # "2": wechatPaymentStrategy  # 未来新增微信支付

