services:
  mysql:
    image: mysql:8.0.35
    container_name: mall-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: mall
      TZ: Asia/Shanghai
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=128M
      --max-connections=100
      --bind-address=0.0.0.0
    volumes:
      - /opt/mall/data/mysql:/var/lib/mysql
      - /opt/mall/config/mysql/conf.d:/etc/mysql/conf.d
    deploy:
      resources:
        limits:
          memory: 1024M
    networks:
      - mall-network

  redis:
    image: redis:7.0
    container_name: mall-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass 123456 --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - /opt/mall/data/redis:/data
    deploy:
      resources:
        limits:
          memory: 80M
    networks:
      - mall-network

  mongodb:
    image: mongo:5.0
    container_name: mall-mongo
    restart: always
    ports:
      - "27017:27017"
    command: --wiredTigerCacheSizeGB 0.25 --maxConns 50
    volumes:
      - /opt/mall/data/mongodb:/data/db
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - mall-network

  rabbitmq:
    image: rabbitmq:3.9-management
    container_name: mall-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: mall
      RABBITMQ_DEFAULT_PASS: mall
      RABBITMQ_DEFAULT_VHOST: /mall
      TZ: Asia/Shanghai
    volumes:
      - /opt/mall/data/rabbitmq:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - mall-network

  elasticsearch:
    image: elasticsearch:7.17.3
    container_name: mall-es
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      TZ: Asia/Shanghai
      cluster.name: mall-es
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms128m -Xmx128m"
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      xpack.monitoring.enabled: "false"
    volumes:
      - /opt/mall/data/elasticsearch:/usr/share/elasticsearch/data
      - /opt/mall/data/elasticsearch-plugins:/usr/share/elasticsearch/plugins
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - mall-network

  nginx:
    image: nginx:1.22
    container_name: mall-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/mall/config/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/mall/data/nginx-html:/usr/share/nginx/html
      - /opt/mall/logs/nginx:/var/log/nginx
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - mall-network

networks:
  mall-network:
    name: mall-network
    driver: bridge
